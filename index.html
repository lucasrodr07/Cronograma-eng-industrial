<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cronograma Industrial | Motherson</title>
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1/dayjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1/locale/pt-br.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1/plugin/isBetween.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1/plugin/minMax.js"></script>
    <script>
        dayjs.locale('pt-br');
        dayjs.extend(window.dayjs_plugin_isBetween);
        dayjs.extend(window.dayjs_plugin_minMax);
    </script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="custom-tooltip" class="no-mobile"></div>

<div class="toolbar no-print">
    <div class="header-container">
        <img src="logo.png" alt="Motherson Logo" style="height: 36px; margin-right: 5px; object-fit: contain;">
        <div class="title-group">
            <h2 id="main-title">Cronograma Engenharia Industrial</h2>
            <span id="data-header">Conectando ao banco de dados...</span>
        </div>
    </div>

    <div id="kpi-dashboard" class="kpi-container">
        <div class="kpi-card">
            <span class="kpi-label">Percentual de Ações Concluídas</span>
            <span id="kpi-progresso-total" class="kpi-value">0%</span>
        </div>
        <div class="kpi-card">
            <span class="kpi-label">Tarefas em Atraso</span>
            <span id="kpi-atrasos" class="kpi-value" style="color:#dc3545;">0</span>
        </div>
        <div class="kpi-card">
            <span class="kpi-label">Marcos de Entrega</span>
            <span id="kpi-milestones" class="kpi-value" style="color:#fd7e14;">0</span>
        </div>
    </div>
    
    <div class="controls-wrapper">
        <div class="toolbar-actions">
            <div class="filtros-container">
                <select id="filtro-ano-view" onchange="trocarAno()"></select>
                <select id="filtro-proj-view" onchange="atualizarFiltroAreasGlobais(); salvarFiltros(); gerarMatriz();"></select>
                <select id="filtro-area-view" onchange="salvarFiltros(); gerarMatriz()"></select>
                <select id="filtro-resp-view" onchange="salvarFiltros(); gerarMatriz()"></select>
            </div>
            <div class="button-group">
                <button id="btn-tema" class="btn btn-clear no-mobile" onclick="toggleTheme()">🌙 Tema</button>
                <button class="btn btn-warning" onclick="abrirModalConfig()">⚙️ Setup</button>
                <button class="btn btn-hoje" onclick="irParaHoje(true)">🎯 Hoje</button>
                <button class="btn btn-blue" onclick="abrirModalAcao(null)">+ Ação</button>
                <button class="btn btn-excel no-mobile" onclick="exportarExcel()">📊 Excel</button>
                <button class="btn no-mobile" style="background:#333;" onclick="abrirModalPrint()">🖨️ Imprimir</button>
            </div>
        </div>
        <div class="legend-container">
            <div class="legend-item"><div class="legend-color informativo"></div> Informativo</div>
            <div class="legend-item"><div class="legend-color suporte"></div> Suporte / Atenção</div>
            <div class="legend-item"><div class="legend-color milestone-legend"></div> Milestones Cliente</div>
        </div>
    </div>
</div>

<div id="gantt-container"></div>

<div id="modal-acao" class="modal-overlay no-print">
    <div class="modal-content">
        <h2 id="modal-titulo">Nova Ação</h2>
        <input type="hidden" id="i-id">
        <div class="form-group">
            <label>Projeto</label>
            <select id="i-projeto" onchange="atualizarAreasDoModalAcao()"></select>
        </div>
        <div class="form-group">
            <label>Área / Setor</label>
            <select id="i-area"></select>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Início</label>
                <input type="date" id="i-inicio">
            </div>
            <div class="form-group">
                <label>Fim Previsto</label>
                <input type="date" id="i-fim">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group" style="flex: 0 0 80px;">
                <label>%</label>
                <input type="number" id="i-progresso" min="0" max="100">
            </div>
            <div class="form-group">
                <label>Responsável</label>
                <input type="text" id="i-responsavel" placeholder="Engenheiro / Técnico">
            </div>
        </div>
        <div class="form-group">
            <label>Classificação</label>
            <select id="i-status">
                <option value="informativo">Informativo (Azul)</option>
                <option value="suporte">Suporte / Atenção (Amarelo)</option>
                <option value="milestone">Milestones Cliente (Laranja)</option>
            </select>
        </div>
        <div class="form-group">
            <label>Descrição Detalhada</label>
            <input type="text" id="i-texto" placeholder="Ex: Tryout Máquina 04...">
        </div>
        
        <div class="form-group" style="border-top: 1px solid var(--border-color); margin-top: 15px; padding-top: 10px;">
            <label style="color: var(--motherson-red);">📋 Checklist de Subtarefas</label>
            <div id="lista-subtarefas-modal"></div>
            <div class="input-append">
                <input type="text" id="nova-subtarefa-txt" placeholder="Nova subtarefa..." onkeypress="if(event.key==='Enter') adicionarSubtarefa()">
                <button class="btn btn-blue" onclick="adicionarSubtarefa()">+</button>
            </div>
        </div>

        <div class="modal-actions">
            <button class="btn btn-clear" id="btn-excluir" style="background: #dc3545; display:none;" onclick="apagarTarefaAtual()">🗑️ Excluir</button>
            <div class="right-btns">
                <button class="btn btn-clear" onclick="fecharModais()">Cancelar</button>
                <button class="btn btn-green" onclick="salvarTarefa()">Salvar Nuvem</button>
            </div>
        </div>
    </div>
</div>

<div id="modal-config" class="modal-overlay no-print">
    <div class="modal-content" style="max-width: 600px;">
        <h2 id="setup-title">⚙️ Configurações do Banco</h2>
        <div class="config-grid">
            <div class="config-section" style="background: rgba(255, 243, 205, 0.3); padding: 10px; border-radius: 4px; border: 1px solid var(--border-color);">
                <h4 style="margin-top:0;">Projetos Ativos</h4>
                <div class="lista-itens" id="lista-projetos-config"></div>
                
                <div style="display:flex; gap:5px; margin-bottom: 5px;">
                    <div style="flex:1;">
                        <label style="font-size:10px; color:#888; font-weight:bold;">Início (Mês/Ano)</label>
                        <input type="month" id="cfg-proj-inicio" style="width:100%; padding:6px; border:1px solid var(--border-color); border-radius:4px; font-family:inherit;">
                    </div>
                    <div style="flex:1;">
                        <label style="font-size:10px; color:#888; font-weight:bold;">Fim (Mês/Ano)</label>
                        <input type="month" id="cfg-proj-fim" style="width:100%; padding:6px; border:1px solid var(--border-color); border-radius:4px; font-family:inherit;">
                    </div>
                </div>
                <div class="input-append" style="display:flex; gap:5px;">
                    <input type="text" id="cfg-novo-proj" placeholder="Nome do projeto..." style="flex:1; padding:8px; border:1px solid var(--border-color); border-radius:4px;">
                    <button class="btn btn-blue" onclick="adicionarProjetoConfig()">+</button>
                </div>
                </div>
            <div class="config-section" style="background: rgba(226, 227, 229, 0.3); padding: 10px; border-radius: 4px; border: 1px solid var(--border-color);">
                <h4 style="margin-top:0;">Setores por Projeto</h4>
                <div class="lista-itens" id="lista-areas-config"></div>
                <select id="cfg-area-proj" style="width: 100%; margin-bottom: 5px; padding:8px; border:1px solid var(--border-color); border-radius:4px;"></select>
                <div class="input-append" style="display:flex; gap:5px;">
                    <input type="text" id="cfg-nova-area" placeholder="Novo setor..." style="flex:1; padding:8px; border:1px solid var(--border-color); border-radius:4px;">
                    <button class="btn btn-blue" onclick="adicionarAreaConfig()">+</button>
                </div>
            </div>
        </div>
        <div class="modal-actions footer-right" style="justify-content: flex-end; margin-top: 15px;">
            <button class="btn btn-clear" onclick="fecharModais()">Fechar</button>
        </div>
    </div>
</div>

<div id="modal-print" class="modal-overlay no-print">
    <div class="modal-content" style="max-width: 400px;">
        <h2 style="margin-top:0;">🖨️ Imprimir Cronograma</h2>
        <div class="form-row">
            <div class="form-group"><label>Início</label><input type="date" id="print-inicio"></div>
            <div class="form-group"><label>Fim</label><input type="date" id="print-fim"></div>
        </div>
        <div class="modal-actions footer-right">
            <button class="btn btn-clear" onclick="fecharModais()">Cancelar</button>
            <button class="btn btn-blue" onclick="executarImpressao()">Gerar</button>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script src="script.js" defer></script>
</body>
</html>
