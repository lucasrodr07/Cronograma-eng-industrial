<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cronograma Industrial | Motherson</title>
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1/dayjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1/locale/pt-br.js"></script>
    <script>dayjs.locale('pt-br');</script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="custom-tooltip" class="no-mobile"></div>

<div class="toolbar">
    <div class="header-container">
        <div class="logo-motherson">MOTHERSON</div>
        <div class="title-group">
            <h2 id="main-title">Cronograma Engenharia Industrial</h2>
            <span id="data-header">Sincronizando...</span>
        </div>
    </div>
    
    <div class="controls-wrapper no-print">
        <div class="toolbar-actions">
            <div class="filtros-container">
                <select id="filtro-proj-view" onchange="atualizarFiltroAreasGlobais(); gerarMatriz();"></select>
                <select id="filtro-area-view" onchange="gerarMatriz()"></select>
            </div>
            <div class="button-group">
                <button class="btn btn-warning" onclick="abrirModalConfig()">⚙️ Setup</button>
                <button class="btn btn-hoje" onclick="irParaHoje()">🎯 Hoje</button>
                <button class="btn btn-blue" onclick="abrirModalAcao(null)">+ Ação</button>
                <button class="btn btn-excel no-mobile" onclick="exportarExcel()">📊 Excel</button>
                <button class="btn no-mobile" style="background:#333;" onclick="window.print()">🖨️ Imprimir</button>
            </div>
        </div>
        <div class="legend-container">
            <div class="legend-item"><div class="legend-color informativo"></div> Operacional</div>
            <div class="legend-item"><div class="legend-color suporte"></div> Suporte / Atenção</div>
            <div class="legend-item"><div class="legend-color milestone"></div> Milestones Cliente</div>
        </div>
    </div>
</div>

<div id="gantt-container"></div>

<div id="modal-acao" class="modal-overlay">
    <div class="modal-content">
        <h2 id="modal-titulo">Nova Ação</h2>
        <input type="hidden" id="i-id">
        <div class="form-group">
            <label>Projeto</label>
            <select id="i-projeto" onchange="atualizarAreasDoModalAcao()"></select>
        </div>
        <div class="form-group">
            <label>Área / Setor</label>
            <select id="i-area"></select>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Início</label>
                <input type="date" id="i-inicio">
            </div>
            <div class="form-group">
                <label>Fim Previsto</label>
                <input type="date" id="i-fim">
            </div>
        </div>
        <div class="form-row">
            <div class="form-group" style="flex: 0 0 80px;">
                <label>%</label>
                <input type="number" id="i-progresso" min="0" max="100">
            </div>
            <div class="form-group">
                <label>Responsável</label>
                <input type="text" id="i-responsavel" placeholder="Engenheiro / Técnico">
            </div>
        </div>
        <div class="form-group">
            <label>Classificação</label>
            <select id="i-status">
                <option value="informativo">Operacional (Azul)</option>
                <option value="suporte">Suporte / Atenção (Amarelo)</option>
                <option value="milestone">Milestones Cliente (Laranja)</option>
            </select>
        </div>
        <div class="form-group">
            <label>Descrição Detalhada</label>
            <input type="text" id="i-texto" placeholder="Ex: Tryout Máquina 04...">
        </div>
        <div class="modal-actions">
            <button class="btn btn-clear" id="btn-excluir" style="background: #dc3545; display:none;" onclick="apagarTarefaAtual()">🗑️ Excluir</button>
            <div class="right-btns">
                <button class="btn btn-clear" onclick="fecharModais()">Cancelar</button>
                <button class="btn btn-green" onclick="salvarTarefa()">Salvar Nuvem</button>
            </div>
        </div>
    </div>
</div>

<div id="modal-config" class="modal-overlay">
    <div class="modal-content">
        <h2>⚙️ Configurações do Banco</h2>
        <div class="config-date-box" style="background:#f8f9fa; padding:15px; border-radius:5px; border:1px solid #ddd; margin-bottom:15px;">
            <div class="form-row">
                <div class="form-group" style="margin-bottom:0;">
                    <label>Início do Gráfico</label>
                    <input type="date" id="cfg-inicio">
                </div>
                <div class="form-group" style="margin-bottom:0;">
                    <label>Fim do Gráfico</label>
                    <input type="date" id="cfg-fim">
                </div>
            </div>
        </div>
        <div class="config-grid">
            <div class="config-section" style="background: #fff3cd; padding: 10px; border-radius: 4px;">
                <h4 style="margin-top:0;">Projetos</h4>
                <div class="lista-itens" id="lista-projetos-config"></div>
                <div class="input-append" style="display:flex; gap:5px;">
                    <input type="text" id="cfg-novo-proj" placeholder="Novo projeto..." style="flex:1; padding:8px; border:1px solid #ccc; border-radius:4px;">
                    <button class="btn btn-blue" onclick="adicionarProjetoConfig()">+</button>
                </div>
            </div>
            <div class="config-section" style="background: #e2e3e5; padding: 10px; border-radius: 4px;">
                <h4 style="margin-top:0;">Setores por Projeto</h4>
                <div class="lista-itens" id="lista-areas-config"></div>
                <select id="cfg-area-proj" style="width: 100%; margin-bottom: 5px; padding:8px; border:1px solid #ccc; border-radius:4px;"></select>
                <div class="input-append" style="display:flex; gap:5px;">
                    <input type="text" id="cfg-nova-area" placeholder="Novo setor..." style="flex:1; padding:8px; border:1px solid #ccc; border-radius:4px;">
                    <button class="btn btn-blue" onclick="adicionarAreaConfig()">+</button>
                </div>
            </div>
        </div>
        <div class="modal-actions footer-right" style="justify-content: flex-end; margin-top: 15px;">
            <button class="btn btn-clear" onclick="fecharModais()">Cancelar</button>
            <button class="btn btn-green" onclick="salvarConfiguracoes()">Aplicar e Sincronizar</button>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script src="script.js" defer></script>
</body>
</html>
